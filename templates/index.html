<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЕГЭ Русский</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            margin: 10px;
            padding: 15px 25px;
            font-size: 18px;
            text-decoration: none;
            color: white;
            background: #4CAF50;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #45a049;
        }

        .btn.blue {
            background: #2196F3;
        }

        .btn.blue:hover {
            background: #1e88e5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Тренажёр ЕГЭ Русский</h1>

        <a class="btn" href="/accent">
            Ударения
        </a>

        <a class="btn blue" href="/letters">
            Вставить буквы
        </a>
    </div>
</body>
</html>
