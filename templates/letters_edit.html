<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Редактирование</title>

<style>
body {
    font-family: Arial;
    margin: 40px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 300px;
}
</style>
</head>
<body>

<h1>Редактирование задания</h1>

<form method="POST">
    <label>Текст (masked)</label>
    <input name="masked" value="{{ word.masked }}">

    <label>Ответ (correct)</label>
    <input name="correct" value="{{ word.correct }}">

    <button type="submit">Сохранить</button>
</form>

</body>
</html>
